services:
  mysql:
    image: mysql:8.4
    container_name: fx-wallet-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: fx_wallet
      MYSQL_USER: fx_user
      MYSQL_PASSWORD: fx_password
    ports:
      - "3306:3306"
    volumes:
      - fx_wallet_mysql:/var/lib/mysql
      - ./server/src/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fx_wallet_mysql:
